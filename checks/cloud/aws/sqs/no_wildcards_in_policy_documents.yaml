terraform:
  good:
    - |-
      resource "aws_sqs_queue_policy" "good_example" {
        queue_url = aws_sqs_queue.q.id

        policy = <<POLICY
       {
         "Statement": [
           {
             "Effect": "Allow",
             "Principal": "*",
             "Action": "sqs:SendMessage"
           }
         ]
       }
       POLICY
      }
  bad:
    - |-
      resource "aws_sqs_queue_policy" "bad_example" {
        queue_url = aws_sqs_queue.q.id

        policy = <<POLICY
       {
         "Statement": [
           {
             "Effect": "Allow",
             "Principal": "*",
             "Action": "*"
           }
         ]
       }
       POLICY
      }
cloudformation:
  good:
    - |
      AWSTemplateFormatVersion: 2010-09-09T00:00:00Z
      Description: Good example of queue policy
      Resources:
          MyQueue:
              Properties:
                  Name: something
              Type: AWS::SQS::Queue
          SampleSQSPolicy:
              Properties:
                  PolicyDocument:
                      Statement:
                          - Action:
                              - SQS:SendMessage
                              - SQS:ReceiveMessage
                            Effect: Allow
                            Principal:
                              AWS:
                                  - "111122223333"
                            Resource: arn:aws:sqs:us-east-2:444455556666:queue2
                  Queues:
                      - Ref: MyQueue
              Type: AWS::SQS::QueuePolicy
  bad:
    - |
      AWSTemplateFormatVersion: 2010-09-09T00:00:00Z
      Description: Bad example of queue policy
      Resources:
          MyQueue:
              Properties:
                  Name: something
              Type: AWS::SQS::Queue
          SampleSQSPolicy:
              Properties:
                  PolicyDocument:
                      Statement:
                          - Action:
                              - '*'
                            Effect: Allow
                            Principal:
                              AWS:
                                  - "111122223333"
                            Resource: arn:aws:sqs:us-east-2:444455556666:queue2
                  Queues:
                      - MyQueue
              Type: AWS::SQS::QueuePolicy
