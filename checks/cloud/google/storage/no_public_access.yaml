terraform:
  good:
    - "resource \"google_storage_bucket_iam_binding\" \"binding\" {\n  bucket = google_storage_bucket.default.name\n  role   = \"roles/storage.admin\"\n  members = [\n    \"user:jane@example.com\",\n  ]\n}\n    "
