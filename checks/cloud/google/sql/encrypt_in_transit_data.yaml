terraform:
  good:
    - "# For terraform-provider-google < 6.0.1\nresource \"google_sql_database_instance\" \"postgres\" {\n  name             = \"postgres-instance-a\"\n  database_version = \"POSTGRES_11\"\n\n  settings {\n    tier = \"db-f1-micro\"\n\n    ip_configuration {\n      ipv4_enabled = false\n      authorized_networks {\n        value = \"108.12.12.0/24\"\n        name  = \"internal\"\n      }\n      require_ssl = true\n    }\n  }\n}\n    "
    - "# For terraform-provider-google >= 6.0.1\nresource \"google_sql_database_instance\" \"postgres\" {\n  name             = \"postgres-instance-a\"\n  database_version = \"POSTGRES_11\"\n\n  settings {\n    tier = \"db-f1-micro\"\n\n    ip_configuration {\n      ipv4_enabled = false\n      authorized_networks {\n        value = \"108.12.12.0/24\"\n        name  = \"internal\"\n      }\n      ssl_mode = \"TRUSTED_CLIENT_CERTIFICATE_REQUIRED\"\n    }\n  }\n}\n    "
  bad:
    - "resource \"google_sql_database_instance\" \"postgres\" {\n  name             = \"postgres-instance-a\"\n  database_version = \"POSTGRES_11\"\n\n  settings {\n    tier = \"db-f1-micro\"\n\n    ip_configuration {\n      ipv4_enabled = false\n      authorized_networks {\n        value = \"108.12.12.0/24\"\n        name  = \"internal\"\n      }\n      require_ssl = false\n    }\n  }\n}\n    "
    - |-
      resource "google_sql_database_instance" "postgres" {
        name             = "postgres-instance-a"
        database_version = "POSTGRES_11"

        settings {
          tier = "db-f1-micro"

          ip_configuration {
            ipv4_enabled = false
            authorized_networks {
              value = "108.12.12.0/24"
              name  = "internal"
            }
            ssl_mode = "ALLOW_UNENCRYPTED_AND_ENCRYPTED"
          }
        }
      }
