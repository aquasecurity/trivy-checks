name: Test
on:
  push:
    branches:
      - main
  pull_request:
  merge_group:
  workflow_dispatch:

jobs:
  test-go:
    name: Test Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: go.mod

      - name: Run Go tests
        run: make test

  test-rego:
    name: Test Rego
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: go.mod

      - name: Validate Rego syntax
        run: go run ./cmd/opa check lib checks --strict --v0-v1

      - name: Setup Regal
        uses: StyraInc/setup-regal@33a142b1189004e0f14bf42b15972c67eecce776 # v1
        with:
          version: 0.34.1

      - name: Lint Rego
        run: make lint-rego

      - name: OPA Format
        run: |
          make fmt-rego
          if [ -n "$(git status --porcelain)" ]; then
            echo "Run 'make fmt-rego' and push it"
            exit 1
          fi

      - name: Run Rego tests
        run: make test-rego

      - name: Validate Rego against Trivy schemas
        run: make check-rego-matrix

  test-docs:
    name: Test Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: go.mod

      - name: Verify docs are up-to-date
        run: |
          make docs
          if [ -n "$(git status --porcelain)" ]; then
            echo "Run 'make docs' and push it"
            exit 1
          fi

  test-integration:
    uses: ./.github/workflows/integration-tests.yaml
